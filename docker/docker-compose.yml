services:
  ordexwallet:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ordexwallet
    volumes:
      - ordexwallet_data:/data
    ports:
      - "15000:5000"
    environment:
      - CONFIG_DIR=/data/config
      - DATA_DIR=/data
      - HOST=0.0.0.0
      - PORT=5000
      - FLASK_ENV=production
    restart: unless-stopped

volumes:
  ordexwallet_data:
    name: ordexwallet_data
