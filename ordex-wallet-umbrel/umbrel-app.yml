manifestVersion: 1
id: ordex-wallet
category: finance
name: OrdexWallet
version: "1.1.0"
tagline: Self-hosted web wallet for OrdexCoin and OrdexGold
description: >-
  OrdexWallet is a complete custodial web wallet for OrdexNetwork that supports both OrdexCoin (OXC) and OrdexGold (OXG). 
  Run your own self-hosted wallet with local daemon binaries, providing secure storage and management of your digital assets.
  Features include real-time balance display, transaction management, wallet backup/restore, daemon configuration, 
  health checks with sync status, Prometheus metrics, and automatic log rotation.
  
  **Note**: Currently supports x86/x64 platforms only. ARM platforms require manual compilation of ordexcoind and ordexgoldd daemons.
releaseNotes: >-
  OrdexWallet v1.1.0 - Feature release
  
  New Features:
  - Health check endpoint now shows blockchain sync percentage
  - Prometheus metrics endpoint at /api/system/metrics
  - Automatic log rotation (10MB max, 5 backup files)
  - Daemon auto-download during Docker build
  
  Bug Fixes:
  - Fixed daemon startup race condition
  - Fixed wallet loading logs
  - Fixed volume permissions
  - Stronger credential generation
  
